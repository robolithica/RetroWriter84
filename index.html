<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retro Writer</title>

<link rel="apple-touch-icon" href="RetroWritericon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">

<style>

@font-face {
    font-family: "RetroIBM";
    src: url("WebPlus_IBM_BIOS.woff") format("woff");
    font-weight: normal;
    font-style: normal;
}
    
body {
    margin: 0;
    background: #000;
    color: #33ff66;
    font-family: "RetroIBM", monospace;
}

#app {
    display: flex;
    height: 100vh;
    flex-direction: row;
    width: 100vw;
}

/* LEFT PANEL (documents) */
#sidebar {
   flex: 0 0 220px;
   width: 220px;
    min-width: 220px;
    max-width: 220px;
   border-right-width: 1px;
   border-right-style: solid;
   border-right-color: #33ff66;
    padding: 40px 10px 10px 10px;
    box-sizing: border-box;
}

.doc {
    padding: 6px;
    cursor: pointer;
}

.doc:hover {
    background: #003300;
}

.active {
    background: #003300;
    border-left-width: 1px;
    border-left-style: solid;
    border-left-color: #33ff66;
    padding-left: 3px;
}
/* RIGHT PANEL (editor) */
#editorWrap {
    flex: 1;
    min-width: 0;
    height: 100%;
    box-sizing: border-box;
    padding: 30px;
    transition: all 0.2s ease;
}

#editor {
    width: 100%;
    height: 100%;
    outline: none;
    white-space: pre-wrap;
    text-shadow: 0 0 6px #33ff66;
    font-size: 15px;
    line-height: 2.6;
    padding: 40px 85px 20px 55px;
    overflow-wrap: anywhere;
    word-break: break-word;
    word-break: break-all;
    word-wrap: break-word;
    overflow-y: hidden;
}

#sidebar.hidden {
    flex: 0 0 0;
    width: 0;
    min-width: 0;
    max-width: 0;
    padding: 0;
    overflow: hidden;
    border-right: none;
}

#menuBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    cursor: pointer;
    color: #33ff66;
    z-index: 1000;
    font-size: 18px;
}
html, body {
    height: 100%;
    overflow: hidden;
}

</style>
</head>

<body>

<div id="app">
<div onclick="toggleSidebar()" id="menuBtn">☰</div>
    <div id="sidebar">

<div onclick="newDoc()">+ NEW</div><br>
<div onclick="importDoc()">+ OPEN</div><br>
<div onclick="saveDoc()">+ SAVE</div><br>
<div onclick="deleteDoc()">+ DELETE</div>
<hr>
<div id="docList"></div>    </div>

    <div id="editorWrap">
       <div id="editor" contenteditable="true"></div>
    </div>
<input type="file" id="fileInput" accept=".txt" style="display:none;">
</div>

<script>
let docs = JSON.parse(localStorage.getItem("docs") || "{}");
let currentId = null;

const editor = document.getElementById("editor");
const list = document.getElementById("docList");

function saveAll() {
    localStorage.setItem("docs", JSON.stringify(docs));
}

function renderList() {
    list.innerHTML = "";

    Object.keys(docs).forEach(id => {
        const div = document.createElement("div");
        div.className = "doc";

        if (id === currentId) {
            div.classList.add("active");
        }

        div.textContent = docs[id].title || "Untitled";

        div.onclick = () => openDoc(id);
        div.ondblclick = () => renameDoc(id);

        list.appendChild(div);
    });
}
function openDoc(id) {
    currentId = id;
    editor.textContent = docs[id].content;
    renderList();

    // force focus back into editor
    setTimeout(() => {
        editor.focus();
    }, 0);
}
function newDoc() {
    const id = Date.now().toString();

    docs[id] = {
        title: "Untitled",
        content: ""
    };

    saveAll();
    renderList();
    openDoc(id);
}

editor.addEventListener("input", () => {
    if (!currentId) return;

    docs[currentId].content = editor.textContent;
    saveAll();
});

editor.addEventListener("paste", () => {
    setTimeout(() => {
        cleanFormatting();
    }, 10);
});


// boot
if (Object.keys(docs).length === 0) {
    newDoc();
} else {
    openDoc(Object.keys(docs)[0]);
}
function renameDoc(id) {
    const newTitle = prompt("Document name:", docs[id].title);

    if (newTitle !== null && newTitle.trim() !== "") {
        docs[id].title = newTitle.trim();
        saveAll();
        renderList();
    }
}

function exportDoc(id) {
    const text = docs[id].content;
    const title = (docs[id].title || "Untitled") + ".txt";

    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = title;

    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

const fileInput = document.getElementById("fileInput");

function importDoc() {
    fileInput.click();
}

fileInput.addEventListener("change", (event) => {

    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const id = Date.now().toString();

        docs[id] = {
            title: file.name.replace(/\.txt$/i, ""),
            content: e.target.result
        };

        saveAll();
        renderList();
        openDoc(id);
    };

    reader.readAsText(file);

    fileInput.value = "";
});

function deleteDoc() {

    if (!currentId) return;

    const title = docs[currentId].title;

    if (!confirm(`Delete "${title}"?`)) {
        return;
    }

    delete docs[currentId];

    saveAll();

    const ids = Object.keys(docs);

    if (ids.length > 0) {
        openDoc(ids[0]);
    } else {
        currentId = null;
        editor.textContent = "";
        renderList();
    }
}

function saveDoc() {

    if (!currentId) return;

    exportDoc(currentId);
}

function cleanFormatting() {
    editor.querySelectorAll("*").forEach(el => {
        el.style.fontFamily = "RetroIBM";
        el.style.fontSize = "";
        el.style.color = "";
        el.style.backgroundColor = "";
    });
}

function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("hidden");
}
</script>

</body>
</html>
