<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retro Writer TEST</title>

<link rel="apple-touch-icon" href="RetroWritericon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">

<style>

@font-face {
    font-family: "RetroIBM";
    src: url("WebPlus_IBM_BIOS.woff") format("woff");
    font-weight: normal;
    font-style: normal;
}
    
body {
    margin: 0;
    background: #000;
    color: #33ff66;
    font-family: "RetroIBM", monospace;
}

#app {
    display: flex;
    height: 100vh;
    flex-direction: row;
    width: 100vw;
}

/* LEFT PANEL (documents) */
#sidebar {
   flex: 0 0 220px;
   width: 220px;
    min-width: 220px;
    max-width: 220px;
   border-right-width: 1px;
   border-right-style: solid;
   border-right-color: #33ff66;
    padding: 40px 10px 10px 10px;
    box-sizing: border-box;
}

.doc {
    padding: 6px;
    cursor: pointer;
}

.doc:hover {
    background: #003300;
}

.active {
    background: #003300;
    border-left-width: 1px;
    border-left-style: solid;
    border-left-color: #33ff66;
    padding-left: 3px;
}
/* RIGHT PANEL (editor) */
#editorWrap {
    flex: 1;
    min-width: 0;
    height: 100%;
    box-sizing: border-box;
    padding: 30px;
    transition: all 0.2s ease;
}

#editor {
    width: 100%;
    box-sizing: border-box;
    min-height: 100%;
    outline: none;
    white-space: pre-wrap;
    text-shadow: 0 0 6px #33ff66;
    font-size: 15px;
    line-height: 2.6;
    padding: 40px 150px 20px 55px;
    overflow-wrap: break-word;
    word-break: break-word;
    word-wrap: break-word;
}

#sidebar.hidden {
    flex: 0 0 0;
    width: 0;
    min-width: 0;
    max-width: 0;
    padding: 0;
    overflow: hidden;
    border-right: none;
}

#menuBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    cursor: pointer;
    color: #33ff66;
    z-index: 1000;
    font-size: 18px;
}

#statusBar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 24px;
    border-top: 1px solid #33ff66;
    background: #000;
    color: #33ff66;
    font-size: 14px;
    padding: 4px 10px;
    box-sizing: border-box;
}

#app {
    display: flex;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
}

#sidebar {
    overflow-y: auto;
    height: 100vh;
}

#editorWrap {
    overflow-y: auto;
    overflow-x: hidden;
    height: 100vh;
}

</style>
</head>

<body>

<div id="app">
<div onclick="toggleSidebar()" id="menuBtn">☰</div>
    <div id="sidebar">

<div onclick="newDoc()">+ NEW</div><br>
<div onclick="importDoc()">+ OPEN</div><br>
<div onclick="saveDoc()">+ SAVE</div><br>
<div onclick="closeDoc()">+ CLOSE</div><br>
<!--<div onclick="deleteDoc()">+ DELETE</div>-->
<hr>
<div id="docList"></div>    </div>

    <div id="editorWrap">
       <div id="editor" contenteditable="true"></div>
    </div>
<input type="file" id="fileInput" accept=".txt,.html" style="display:none;">
</div>

<div id="statusBar">
    Words: <span id="wordCount">0</span> |
    Characters: <span id="characterCount">0</span> |
    Pages: <span id="pageCount">0.0</span>
</div>

<script>
let docs = {};
let currentId = null;

const editor = document.getElementById("editor");
const list = document.getElementById("docList");

function saveAll() {
    localStorage.setItem("docs", JSON.stringify(docs));
}

function renderList() {
    list.innerHTML = "";

    Object.keys(docs).forEach(id => {
        const div = document.createElement("div");
        div.className = "doc";

        if (id === currentId) {
            div.classList.add("active");
        }

        div.textContent = docs[id].title || "Untitled";

        div.onclick = () => openDoc(id);
        div.ondblclick = () => renameDoc(id);

        list.appendChild(div);
    });
}
function openDoc(id) {
    currentId = id;
    editor.innerHTML = docs[id].content;
    renderList();

    updateStats();
    // force focus back into editor
    setTimeout(() => {
        editor.focus();
    }, 0);
}
function newDoc() {
    const id = Date.now().toString();

    docs[id] = {
        title: "Untitled",
        content: ""
    };

    saveAll();
    renderList();
    openDoc(id);
}

editor.addEventListener("paste", (e) => {
    e.preventDefault();

    const text = (e.clipboardData || window.clipboardData)
        .getData("text/plain");

    document.execCommand("insertText", false, text);
});

// boot
currentId = null;
editor.innerHTML = "";
renderList();
updateStats();
    
function renameDoc(id) {
    const newTitle = prompt("Document name:", docs[id].title);

    if (newTitle !== null && newTitle.trim() !== "") {
        docs[id].title = newTitle.trim();
        saveAll();
        renderList();
    }
}

function exportDoc(id) {

    const content = docs[id].content;
    const title = (docs[id].title || "Untitled") + ".html";

    const html = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>${docs[id].title}</title>
</head>
<body>
${content}
</body>
</html>
`;

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = title;

    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
const fileInput = document.getElementById("fileInput");

function importDoc() {
    fileInput.click();
}

fileInput.addEventListener("change", (event) => {

    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

    const id = Date.now().toString();

    let content = e.target.result;

    if (file.name.toLowerCase().endsWith(".html")) {

        const parser = new DOMParser();
        const htmlDoc = parser.parseFromString(content, "text/html");

        content = htmlDoc.body.innerHTML;

    } else {

        content = e.target.result;

    }

    docs[id] = {
        title: file.name.replace(/\.(txt|html)$/i, ""),
        content: content
    };

    saveAll();
    renderList();
    openDoc(id);
};

    reader.readAsText(file);

    fileInput.value = "";
});

/*function deleteDoc() {

    if (!currentId) return;

    const title = docs[currentId].title;

    if (!confirm(`Delete "${title}"?`)) {
        return;
    }

    delete docs[currentId];

    saveAll();

    const ids = Object.keys(docs);

    if (ids.length > 0) {
        openDoc(ids[0]);
    } else {
        currentId = null;
        editor.textContent = "";
        renderList();
    }
}*/

function saveDoc() {

    if (!currentId) return;

    exportDoc(currentId);
}

function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("hidden");
}

/*if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js")
    .then(() => console.log("Service Worker Registered"));
}*/

function updateStats() {
    const text = editor.textContent || "";

    const words = text.trim() === ""
        ? 0
        : text.trim().split(/\s+/).length;

    const characters = text.length;
    const pages = (words / 250).toFixed(1);

    console.log({
        words,
        characters,
        pages
    });

    document.getElementById("wordCount").textContent = words;
    document.getElementById("characterCount").textContent = characters;
    document.getElementById("pageCount").textContent = pages;
}
    editor.addEventListener("input", () => {
    if (!currentId) return;

    docs[currentId].content = editor.innerHTML;
    saveAll();

    updateStats();
});
    updateStats();

function closeDoc() {

    if (!currentId) return;

    delete docs[currentId];

    currentId = null;

    editor.innerHTML = "";

    renderList();

    updateStats();
}

document.addEventListener("keydown", (e) => {

    // Prevent repeated jumps if key is held down
    if (e.repeat) return;

    // Alt + Down Arrow = next chapter
    if (e.altKey && e.key === "ArrowDown") {

        e.preventDefault();

        findNextChapter();
    }

});


function findNextChapter() {

    const text = editor.textContent;
    const selection = window.getSelection();

    let start = 0;

    if (selection.rangeCount > 0) {

        const range = selection.getRangeAt(0);
        const preCaretRange = range.cloneRange();

        preCaretRange.selectNodeContents(editor);
        preCaretRange.setEnd(range.endContainer, range.endOffset);

        start = preCaretRange.toString().length;
    }

   let searchText = text.substring(start + 10);

let match = searchText.match(/CHAPTER\s+\d+/i);

if (!match) {
    return;
}

let index = start + 1 + match.index;

    const range = document.createRange();
    const walker = document.createTreeWalker(
        editor,
        NodeFilter.SHOW_TEXT
    );

    let position = 0;
    let node;

    while (node = walker.nextNode()) {

        if (position + node.length >= index) {

            range.setStart(
            node,
            index - position + match[0].length
);

            range.collapse(true);

            selection.removeAllRanges();
            selection.addRange(range);

            editor.focus();

            const caretRect = range.getBoundingClientRect();

editor.parentElement.scrollTo({
    top: editor.parentElement.scrollTop + caretRect.top - 50,
    behavior: "smooth"
});

            break;
        }

        position += node.length;
    }
}

document.addEventListener("keydown", (e) => {

    if (e.repeat) return;

    // Alt + Up Arrow = previous chapter
    if (e.altKey && e.key === "ArrowUp") {

        e.preventDefault();

        findPreviousChapter();
    }

});


function findPreviousChapter() {

    const text = editor.textContent;
    const selection = window.getSelection();

    let start = text.length;

    if (selection.rangeCount > 0) {

        const range = selection.getRangeAt(0);
        const preCaretRange = range.cloneRange();

        preCaretRange.selectNodeContents(editor);
        preCaretRange.setEnd(range.endContainer, range.endOffset);

        start = preCaretRange.toString().length;
    }

    const searchText = text.substring(0, start - 1);

    const matches = [...searchText.matchAll(/CHAPTER\s+\d+/gi)];

    if (matches.length === 0) {
        return;
    }

    const match = matches[matches.length - 1];

    const index = match.index;

    const newRange = document.createRange();
    const walker = document.createTreeWalker(
        editor,
        NodeFilter.SHOW_TEXT
    );

    let position = 0;
    let node;

    while (node = walker.nextNode()) {

        if (position + node.length >= index) {

            newRange.setStart(
                node,
                index - position + match[0].length
            );

            newRange.collapse(true);

            selection.removeAllRanges();
            selection.addRange(newRange);

            editor.focus();

            const caretRect = newRange.getBoundingClientRect();

            editor.parentElement.scrollTo({
                top: editor.parentElement.scrollTop + caretRect.top - 50,
                behavior: "smooth"
            });

            break;
        }

        position += node.length;
    }
}
</script>

</body>
</html>
