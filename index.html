<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retro Writer</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #33ff66;
    font-family: monospace;
}

#app {
    display: flex;
    height: 100vh;
}

/* LEFT PANEL (documents) */
#sidebar {
    width: 220px;
    border-right: 1px solid #33ff66;
    padding: 10px;
    box-sizing: border-box;
}

.doc {
    padding: 6px;
    cursor: pointer;
}

.doc:hover {
    background: #003300;
}

.active {
    background: #005500;
}

/* RIGHT PANEL (editor) */
#editorWrap {
    flex: 1;
    padding: 30px;
}

#editor {
    width: 100%;
    height: 100%;
    outline: none;
    white-space: pre-wrap;
    text-shadow: 0 0 6px #33ff66;
}
</style>
</head>

<body>

<div id="app">

    <div id="sidebar">
        <div onclick="newDoc()">+ NEW</div>
        <div id="docList"></div>
    </div>

    <div id="editorWrap">
        <div id="editor" contenteditable="true"></div>
    </div>

</div>

<script>
let docs = JSON.parse(localStorage.getItem("docs") || "{}");
let currentId = null;

const editor = document.getElementById("editor");
const list = document.getElementById("docList");

function saveAll() {
    localStorage.setItem("docs", JSON.stringify(docs));
}

function renderList() {
    list.innerHTML = "";

    Object.keys(docs).forEach(id => {
        const div = document.createElement("div");
        div.className = "doc" + (id === currentId ? " active" : "");
        div.textContent = docs[id].title || "Untitled";

        div.onclick = () => openDoc(id);

        list.appendChild(div);
    });
}

function openDoc(id) {
    currentId = id;
    editor.textContent = docs[id].content;
    renderList();
}

function newDoc() {
    const id = Date.now().toString();

    docs[id] = {
        title: "Untitled",
        content: ""
    };

    saveAll();
    renderList();
    openDoc(id);
}

editor.addEventListener("input", () => {
    if (!currentId) return;

    docs[currentId].content = editor.textContent;
    saveAll();
});


// boot
if (Object.keys(docs).length === 0) {
    newDoc();
} else {
    openDoc(Object.keys(docs)[0]);
}
</script>

</body>
</html>
